<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · Cloudflare DDNS+</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌩️</text></svg>" />
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/public/app.css" />
  </head>
  <body class="h-full bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <main class="flex min-h-full items-center justify-center px-4 py-12">
      <div class="w-full max-w-sm">
        <div class="mb-6 text-center">
          <div class="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-3xl shadow-lg">
            🌩️
          </div>
          <h1 class="text-xl font-semibold">Cloudflare DDNS+</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400">Sign in to manage your DNS updater</p>
        </div>

        <form id="login-form" class="card space-y-4 p-6">
          <div>
            <label class="label" for="username">Username</label>
            <input class="input" id="username" name="username" autocomplete="username" required />
          </div>
          <div>
            <label class="label" for="password">Password</label>
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <p id="error" class="hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 dark:bg-red-950 dark:text-red-300"></p>
          <button class="btn-primary w-full" type="submit" id="submit">Sign in</button>
        </form>

        <p class="mt-6 text-center text-xs text-slate-400">
          Self-hosted · Configure Cloudflare DDNS without editing JSON
        </p>
      </div>
    </main>

    <script>
      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('error');
      const submit = document.getElementById('submit');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.add('hidden');
        submit.disabled = true;
        submit.textContent = 'Signing in…';
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: form.username.value,
              password: form.password.value,
            }),
          });
          if (res.ok) {
            window.location.href = '/';
            return;
          }
          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'Sign in failed';
          errorEl.classList.remove('hidden');
        } catch (err) {
          errorEl.textContent = 'Network error — is the server running?';
          errorEl.classList.remove('hidden');
        } finally {
          submit.disabled = false;
          submit.textContent = 'Sign in';
        }
      });
    </script>
  </body>
</html>
