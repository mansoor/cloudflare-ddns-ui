name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches the `engines.node` floor, plus the current LTS.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      # The stylesheet is built during the Docker build, so a broken Tailwind
      # source would otherwise only surface at release time.
      - name: Build stylesheet
        run: npm run build:css

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build only (no push) so a broken Dockerfile fails the PR rather than the
      # release tag.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
