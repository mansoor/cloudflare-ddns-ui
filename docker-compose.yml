services:
  cloudflare-ddns-ui:
    build: .
    image: cloudflare-ddns-ui
    container_name: cloudflare-ddns-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Leave blank on first run to get a generated password printed in logs,
      # then set it here (or in a .env file) for subsequent runs.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Set to true to enable the optional "Other DDNS" tab (DuckDNS / FreeDNS / DynDNS2).
      ENABLE_OTHER_DDNS: ${ENABLE_OTHER_DDNS:-false}
      # Set to true to skip the footer's GitHub update check (air-gapped installs).
      DISABLE_UPDATE_CHECK: ${DISABLE_UPDATE_CHECK:-false}
    volumes:
      - ./data:/data
